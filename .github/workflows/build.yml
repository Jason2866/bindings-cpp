name: Build prebuilds

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  prebuild:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS (universal binary) ───────────────────────────
          - name: darwin
            os: macos-latest
            node: x64
            command: prebuildify
            args: --arch x64+arm64

          # ── Windows ────────────────────────────────────────────
          - name: win32-x86
            os: windows-latest
            node: x86
            command: prebuildify

          - name: win32-x64
            os: windows-latest
            node: x64
            command: prebuildify

          - name: win32-arm64
            os: windows-latest
            node: x64
            command: prebuildify
            args: --arch arm64 --tag-armv 8

          # ── Linux ──────────────────────────────────────────────
          - name: linux-x64
            os: ubuntu-latest
            node: x64
            command: prebuildify-cross
            args: -i almalinux-devtoolset11 --tag-libc --libc glibc

          - name: linux-x64-musl
            os: ubuntu-latest
            node: x64
            command: prebuildify-cross
            args: -i alpine

          - name: linux-arm64
            os: ubuntu-latest
            node: x64
            command: prebuildify-cross
            args: -i linux-arm64 --tag-libc --libc glibc

          - name: linux-arm64-musl
            os: ubuntu-latest
            node: x64
            command: prebuildify-cross
            args: -i linux-arm64-musl --tag-libc --libc musl

          - name: linux-arm
            os: ubuntu-latest
            node: x64
            command: prebuildify-cross
            args: -i linux-armv7 -i linux-armv6 --tag-libc --libc glibc

          - name: linux-arm-musl
            os: ubuntu-latest
            node: x64
            command: prebuildify-cross
            args: -i linux-armv7l-musl --tag-libc --libc musl

          # ── Android ────────────────────────────────────────────
          - name: android-arm
            os: ubuntu-latest
            node: x64
            command: prebuildify-cross
            args: -i android-armv7

          - name: android-arm64
            os: ubuntu-latest
            node: x64
            command: prebuildify-cross
            args: -i android-arm64

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          architecture: ${{ matrix.node }}

      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm install

      - name: Build prebuilds
        run: npx ${{ matrix.command }} --napi --target 20.0.0 --force --strip --verbose ${{ matrix.args }}

      - name: Upload prebuilds
        uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ matrix.name }}
          path: prebuilds/
          if-no-files-found: error

      - if: failure()
        run: npx shx ls -lA

  publish:
    needs: prebuild
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # required to use OIDC
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Download all prebuilds
        uses: actions/download-artifact@v8
        with:
          pattern: prebuilds-*
          merge-multiple: true
          path: prebuilds

      - name: List prebuilds
        run: find prebuilds -type f

      - name: Publish to NPM registry (OIDC Trusted Publishing)
        uses: JS-DevTools/npm-publish@v4
        with:
          registry: https://registry.npmjs.org/
          strategy: all
